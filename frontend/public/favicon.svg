<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="eCivil">
  <title>eCivil — République du Mali</title>

  <!--
    The eCivil mark: a classical public building on the national green, standing
    on the gold of the flag.

    Drawn for 16px first. Three heavy columns rather than the six a real pediment
    would carry, because at favicon size anything finer collapses into a grey
    smear. The same Landmark motif appears in the app header, so the browser tab
    and the site logo read as one thing.
  -->

  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#14a05a" />
      <stop offset="1" stop-color="#0c6739" />
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#tile)" />

  <!-- Pediment -->
  <path d="M32 11 55 26 9 26 Z" fill="#ffffff" />

  <!-- Columns -->
  <g fill="#ffffff">
    <rect x="14" y="30" width="7" height="15" rx="1.5" />
    <rect x="28.5" y="30" width="7" height="15" rx="1.5" />
    <rect x="43" y="30" width="7" height="15" rx="1.5" />
  </g>

  <!-- Stylobate, in the gold of the flag -->
  <rect x="9" y="48" width="46" height="6" rx="2" fill="#FCD116" />
</svg>
