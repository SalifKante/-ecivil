name: Deploy demo to GitHub Pages

# Publishes the frontend as a standalone demo with no backend: requests are served
# by the seeded demo adapter (frontend/src/demo). Nothing here touches the API,
# the database or MinIO.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never let two deploys race; cancel the older one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      # v4 of these actions runs on the Node 20 runtime, which the runners now
      # force to 24 and warn about. The warning is cosmetic, but it is noise in
      # every log, so stay on the current majors.
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          # Vite 8, Rolldown, oxlint and plugin-react all require
          # ^20.19.0 || >=22.12.0. Node 20 only satisfies that on its very last
          # releases, so pin the branch that clears it outright.
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # `npm install`, not `npm ci`, and deliberately.
      #
      # The lockfile is generated on Windows, where npm prunes the wasm fallback
      # branch of the native toolchain: @napi-rs/wasm-runtime and the
      # *-wasm32-wasi bindings of Rolldown and Tailwind require @emnapi/core and
      # @emnapi/runtime, but those never get package entries. On Linux npm
      # expects them, so `npm ci` aborts with
      #   "Missing: @emnapi/core from lock file".
      # Regenerating the lockfile here cannot fix it — not with
      # --package-lock-only, not with --os=linux --cpu=x64, not with a full
      # rebuild. All three were tried; all three prune the same entries.
      #
      # `npm install` still honours the lockfile for everything it does cover
      # and only resolves what is missing, so the cost is a little less
      # reproducibility on a demo deploy. The real fix is a lockfile generated
      # on Linux, which is worth doing if this project ever gains a CI matrix.
      - run: npm install --no-audit --no-fund

      - run: npm run lint

      - name: Build the demo
        env:
          # Serves the seeded data instead of calling an API.
          VITE_DEMO_MODE: 'true'
          # Pages serves from /<repo>/. ${{ github.event.repository.name }} keeps
          # this correct even though the repository name starts with a hyphen.
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Add SPA fallback
        # Pages has no rewrite rule, so a deep link like /verifier/<token> would
        # 404 on refresh. Serving index.html as 404.html hands those URLs to the
        # router instead.
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist

  # Requires Pages to be enabled on the repository with the source set to
  # "GitHub Actions" (Settings -> Pages -> Build and deployment -> Source).
  # Without it this job fails with a 404 from the deployment API even though the
  # build above succeeded and the artifact uploaded fine.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
