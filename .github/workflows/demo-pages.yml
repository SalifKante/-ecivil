name: Deploy demo to GitHub Pages

# Publishes the frontend as a standalone demo with no backend: requests are served
# by the seeded demo adapter (frontend/src/demo). Nothing here touches the API,
# the database or MinIO.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never let two deploys race; cancel the older one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run lint

      - name: Build the demo
        env:
          # Serves the seeded data instead of calling an API.
          VITE_DEMO_MODE: 'true'
          # Pages serves from /<repo>/. ${{ github.event.repository.name }} keeps
          # this correct even though the repository name starts with a hyphen.
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Add SPA fallback
        # Pages has no rewrite rule, so a deep link like /verifier/<token> would
        # 404 on refresh. Serving index.html as 404.html hands those URLs to the
        # router instead.
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
